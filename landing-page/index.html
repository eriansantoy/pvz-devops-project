<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVZ Almanac</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🌻 PVZ Almanac</h1>
        <p>Catálogo oficial de plantas defensivas</p>
    </header>

    <section class="plants-section">

        <div class="cards" id="plants-container"></div>

    </section>

    <div class="modal" id="plant-modal">

        <div class="modal-content">

            <span class="close-btn" onclick="closeModal()">
                ✖
            </span>

            <img id="modal-image">

            <div class="modal-info">

                <h2 id="modal-name"></h2>

                <p id="modal-description"></p>

                <p id="modal-damage"></p>

                <p id="modal-cost"></p>

            </div>

        </div>

    </div>

    <script>

        async function loadPlants() {

            const response = await fetch('http://localhost:8080/plants');

            const plants = await response.json();

            const container = document.getElementById('plants-container');

            container.innerHTML = '';

            plants.forEach(plant => {

                const card = document.createElement('div');

                card.classList.add('card');

                card.innerHTML = `
                
                    <img 
                        src="${plant.image_url}"
                        alt="${plant.name}"
                    >

                `;

                card.onclick = () => openModal(plant);

                container.appendChild(card);

            });

        }

        function openModal(plant) {

            document.getElementById('plant-modal').style.display =
                'flex';

            document.getElementById('modal-image').src =
                plant.image_url;

            document.getElementById('modal-name').innerText =
                plant.name;

            document.getElementById('modal-description').innerText =
                plant.description;

            document.getElementById('modal-damage').innerText =
                `💥 Damage: ${plant.damage}`;

            document.getElementById('modal-cost').innerText =
                `🌞 Sun Cost: ${plant.sun_cost}`;

        }

        function closeModal() {

            document.getElementById('plant-modal').style.display =
                'none';

        }

        loadPlants();

    </script>

</body>

</html>
