services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: Zombidito-100
      MYSQL_DATABASE: pvz_db
    ports:
      - "3306:3306"
    networks:
      - pvz-network

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - pvz-network

  backend:
    build: ../backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db # This MUST match the service name above
      DB_USER: root
      DB_PASSWORD: Zombidito-100
      DB_NAME: pvz_db
    depends_on:
      - db
    networks:
      - pvz-network

  frontend:
    build: ../frontend
    ports:
      - "80:80"
    networks:
      - pvz-network

networks:
  pvz-network:
    driver: bridge
