version: '3.8'

services:

  backend:

    build: .

    ports:
      - "8080:8080"

    depends_on:
      - mysql-db

    restart: always

    environment:
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: Zombidito-100
      DB_NAME: pvz_db

  mysql-db:

    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: Zombidito-100
      MYSQL_DATABASE: pvz_db

    ports:
      - "3306:3306"

    restart: always