services:
  db:
    image: mysql:8.0
    container_name: mysql-db-intranet
    environment:
      MYSQL_ROOT_PASSWORD: Zombidito-100
      MYSQL_DATABASE: pvz_db
    ports:
      - "3306:3306"

  backend:
    build: backend
    restart: always
    volumes:
      - ./logs:/app/logs
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build: frontend
    ports:
      - "80:80"
